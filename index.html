<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College</title>

<style>
body{
    margin:0;
    padding:0;
    background:#f6f8fa;
    font-family:Arial,sans-serif;
}

.container{
    width:360px;
    margin:60px auto;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    text-align:center;
}

.logo{
    width:120px;
    height:120px;
    object-fit:contain;
    display:block;
    margin:0 auto 15px;
}

h2{
    margin-bottom:25px;
}

label{
    display:block;
    text-align:left;
    font-weight:bold;
    margin-top:15px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    margin-top:20px;
    background:#2da44e;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<img src="logo/collegelogo.jpg.jpg" class="logo" alt="College Logo">

<h2>Adhiparasakthi Engineering College</h2>

<form>

<label>Your Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<button type="button">Submit</button>

</form>

</div>

</body>
</html>
