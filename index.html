<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search Box</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      font-family: Arial, sans-serif;
    }

    .box {
      text-align: center;
    }

    h1 {
      color: white;
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 300px;
      padding: 12px;
      border-radius: 25px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #ff4b1f;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #ff2a00;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>My Search Page</h1>

    <!-- FORMSPREE FORM -->
    <form action="https://formspree.io/f/xjgqpzzj" method="POST">
      
      <input 
        type="text" 
        name="search_text" 
        placeholder="Type something..." 
        required
      >

      <br>

      <button type="submit">Search</button>
    </form>
  </div>

</body>
</html>
