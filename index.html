<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adhiparasakthi Engineering College</title>

    <style>
        body{
            margin:0;
            padding:0;
            background:#f6f8fa;
            font-family:Arial, sans-serif;
        }

        .container{
            width:350px;
            margin:80px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#24292f;
        }

        label{
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:10px;
            background:#2da44e;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#218739;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Adhiparasakthi Engineering College</h2>

<form>

<label>Username</label>
<input type="text" placeholder="Enter Username">

<label>Password</label>
<input type="password" placeholder="Enter Password">

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
